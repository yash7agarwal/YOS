<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOS — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .progress-bar { transition: width 0.3s ease; }
    .card { @apply bg-gray-800 rounded-xl p-5 border border-gray-700; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Sidebar -->
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col py-6 px-4 shrink-0">
      <div class="mb-8">
        <h1 class="text-xl font-bold text-white">⚡ YOS</h1>
        <p class="text-xs text-gray-500 mt-1">Personal AI OS</p>
      </div>
      <nav class="space-y-1 flex-1">
        <a href="/intel"   class="nav-link {% block nav_intel %}{% endblock %}">🧠 Intelligence</a>
        <a href="/backlog" class="nav-link {% block nav_backlog %}{% endblock %}">📥 Backlog</a>
        <a href="/goals"   class="nav-link {% block nav_goals %}{% endblock %}">🎯 Goals</a>
        <a href="/career"  class="nav-link {% block nav_career %}{% endblock %}">💼 Career</a>
      </nav>
      <div class="text-xs text-gray-600 mt-4">@YOperatingSystem_BOT</div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <style>
    .nav-link {
      display: block;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: #9ca3af;
      text-decoration: none;
      transition: all 0.15s;
    }
    .nav-link:hover { background: #1f2937; color: #f9fafb; }
    .nav-link.active { background: #1d4ed8; color: #fff; }
  </style>
</body>
</html>
